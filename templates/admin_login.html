<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administração | Sistema ECC</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <main class="page-shell">
    <div class="container" style="max-width: 520px; padding-top: 56px;">

      <section class="hero-card">
        <div class="eyebrow">Área restrita</div>

        <h1 class="page-title">
          Configurações do Sistema
        </h1>

        <p class="page-subtitle">
          Informe o token administrativo para acessar as opções de configuração.
        </p>

        {% if erro %}
          <div class="flash error" style="margin-bottom: 16px;">
            {{ erro }}
          </div>
        {% endif %}

        <form method="post" action="{{ url_for('admin_login') }}" class="stack">
          <div>
            <label class="form-label">Token administrativo</label>
            <input
              type="password"
              name="token"
              class="form-control"
              placeholder="Digite o token"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="bi bi-shield-lock"></i>
            Entrar
          </button>

          <a href="{{ url_for('selecionar_paroquia') }}" class="btn btn-soft">
            <i class="bi bi-arrow-left"></i>
            Voltar para seleção de paróquia
          </a>
        </form>
      </section>

    </div>
  </main>
</body>
</html>
