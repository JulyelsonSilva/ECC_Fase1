{% extends "base.html" %}

{% block title %}Cadastro de Palestras{% endblock %}

{% block extra_head %}
<style>
/* =========================================================
   ETAPA 9 — PALESTRAS / CADASTRO DO ANO
   Modernização visual preservando IDs, JS e APIs.
========================================================= */

.nova-palestras-page { max-width: 1120px; margin: 0 auto; padding: 8px 0 64px; color: var(--text); }
.nova-palestras-page .header { position: relative; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; padding: clamp(22px, 3.6vw, 38px); overflow: hidden; border: 1px solid rgba(230, 216, 192, 0.92); border-radius: 28px; background: linear-gradient(110deg, rgba(255,255,255,.94), rgba(255,252,246,.84)), url("{{ url_for('static', filename='img/bg-fluid-lines.svg') }}") right center / 62% 100% no-repeat; box-shadow: 0 22px 54px rgba(8, 43, 77, 0.09), inset 0 1px 0 rgba(255,255,255,.72); }
.nova-palestras-page .header::before { content: ""; position: absolute; right: -110px; top: -130px; width: 340px; height: 340px; pointer-events: none; border-radius: 50%; background: radial-gradient(circle, rgba(201,154,46,.16), transparent 66%); }
.nova-palestras-page .header > * { position: relative; z-index: 1; }
.nova-palestras-page h1 { margin: 0; color: var(--primary); font-family: var(--font-display); font-size: clamp(34px, 4.4vw, 52px); font-weight: 800; line-height: 1.03; letter-spacing: -0.04em; }
.nova-palestras-page h1::before { content: "\F490"; display: inline-grid; place-items: center; width: 56px; height: 56px; margin-right: 14px; vertical-align: middle; color: #fff; font-family: "bootstrap-icons"; font-size: 26px; border-radius: 20px; background: radial-gradient(circle at 32% 24%, rgba(255,255,255,.24), transparent 32%), linear-gradient(135deg, var(--primary), #1f4f7a 52%, var(--primary-dark)); box-shadow: 0 16px 28px rgba(8,43,77,.16); }
.nova-palestras-page .muted, .nova-palestras-page .note { color: var(--muted); line-height: 1.55; }
.nova-palestras-page .note { font-size: 12px; margin-top: 8px; }
.nova-palestras-page .btn { min-height: 42px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 14px; color: var(--primary); font-weight: 900; line-height: 1; text-decoration: none; cursor: pointer; border: 1px solid rgba(31,79,122,.16); border-radius: var(--radius-pill); background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(234,241,248,.72)); box-shadow: 0 8px 18px rgba(8,43,77,.06), inset 0 1px 0 rgba(255,255,255,.72); transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), filter var(--transition); }
.nova-palestras-page .btn:hover { transform: translateY(-1px); border-color: rgba(201,154,46,.42); box-shadow: 0 14px 26px rgba(8,43,77,.10), inset 0 1px 0 rgba(255,255,255,.78); }
.nova-palestras-page .btn.primary, .nova-palestras-page .btn-primary { color: #fff; border-color: rgba(244,228,187,.42); background: linear-gradient(135deg, var(--primary), #1f4f7a 52%, var(--primary-dark)); box-shadow: 0 16px 26px rgba(8,43,77,.18), inset 0 1px 0 rgba(255,255,255,.18); }
.nova-palestras-page .btn.warn { color: #92400e; border-color: rgba(245,158,11,.34); background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(254,243,199,.82)); }
.nova-palestras-page .btn.danger { color: #991b1b; border-color: rgba(185,28,28,.28); background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(254,226,226,.78)); }
.nova-palestras-page .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.nova-palestras-page .card { position: relative; overflow: hidden; padding: 18px; border: 1px solid rgba(230,216,192,.90); border-radius: 24px; background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(255,252,246,.78)); box-shadow: 0 14px 34px rgba(8,43,77,.06), inset 0 1px 0 rgba(255,255,255,.72); }
.nova-palestras-page .card::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: url("{{ url_for('static', filename='img/bg-fluid-lines.svg') }}") right top / 64% auto no-repeat; opacity: .06; }
.nova-palestras-page .card > * { position: relative; z-index: 1; }
.nova-palestras-page h3 { margin: 0 0 12px !important; color: var(--primary); font-family: var(--font-display); font-size: 23px; line-height: 1.15; letter-spacing: -0.025em; }
.nova-palestras-page .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
.nova-palestras-page label { display: block; margin-bottom: 6px; color: var(--primary); font-size: 12px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; }
.nova-palestras-page input, .nova-palestras-page textarea { width: 100%; min-height: 44px; box-sizing: border-box; padding: 10px 12px; color: var(--text); font: inherit; background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(251,248,242,.72)); border: 1px solid rgba(201,154,46,.30); border-radius: 14px; outline: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.74), 0 8px 18px rgba(8,43,77,.04); transition: border-color var(--transition), box-shadow var(--transition), background var(--transition); }
.nova-palestras-page textarea { min-height: 88px; resize: vertical; }
.nova-palestras-page input:focus, .nova-palestras-page textarea:focus { background: #fff; border-color: rgba(31,79,122,.46); box-shadow: 0 0 0 4px rgba(31,79,122,.09), 0 12px 22px rgba(8,43,77,.07); }
.nova-palestras-page .status { margin-top: 9px; min-height: 20px; color: var(--muted); font-size: 13px; font-weight: 700; }
.nova-palestras-page .ok { color: #166534; }
.nova-palestras-page .warn-t { color: #92400e; }
.nova-palestras-page .err { color: #b91c1c; }
.nova-palestras-page .repbar { height: 9px; overflow: hidden; border-radius: 999px; background: rgba(226,232,240,.88); box-shadow: inset 0 1px 2px rgba(8,43,77,.08); }
.nova-palestras-page .repbar > div { height: 100%; width: 0%; transition: width .2s ease; }
.nova-palestras-page .rep0 { background: #10b981; } .nova-palestras-page .rep1 { background: #22c55e; } .nova-palestras-page .rep2 { background: #eab308; } .nova-palestras-page .rep3 { background: #f59e0b; } .nova-palestras-page .rep4 { background: #f97316; } .nova-palestras-page .rep5 { background: #ef4444; }
.nova-palestras-page .justify { display: none; margin-top: 10px; padding-top: 12px; border-top: 1px dashed rgba(201,154,46,.36); }
@media (max-width: 760px) { .nova-palestras-page .header { padding: 24px 20px; border-radius: 22px; } .nova-palestras-page h1 { font-size: 34px; } .nova-palestras-page h1::before { width: 48px; height: 48px; margin-right: 10px; font-size: 22px; border-radius: 17px; } .nova-palestras-page .row, .nova-palestras-page .grid { grid-template-columns: 1fr; } .nova-palestras-page .btn { width: 100%; } }
</style>
{% endblock %}

{% block content %}
<div class="wrap nova-palestras-page">
    <div class="header">
      <h1>Palestras — Ano</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn" href="{{ url_for('palestras_painel') }}"><i class="bi bi-arrow-left"></i> Palestras</a>
        <a class="btn" href="{{ url_for('index') }}"><i class="bi bi-house-door"></i> Página Inicial</a>
      </div>
    </div>

    <div class="card">
      <label for="ano">Ano do Encontro</label>
      <div class="row">
        <input id="ano" type="number" inputmode="numeric" placeholder="Ex.: 2025" value="{{ ano_preselecionado or '' }}">
        <button class="btn primary" id="btn-go">{{ 'Encerrar' if tem_abertos else 'Continuar' }}</button>
      </div>
      <div class="status" id="ano-msg"></div>
    </div>

    <div class="grid" id="grid" style="margin-top:12px; display:none;"></div>
  </div>

  <script>
    const TITULOS = {{ titulos|tojson }};
    const SOLO = new Set({{ solo_titulos|tojson }});
    const EXIST = {{ existentes|tojson }};
    const anoPre = {{ ano_preselecionado|tojson }};
    const TEM_ABERTOS = {{ (tem_abertos | default(false)) | tojson }};
    
    const $ano  = document.getElementById('ano');
    const $go   = document.getElementById('btn-go');
    const $msg  = document.getElementById('ano-msg');
    const $grid = document.getElementById('grid');

    function idFrom(title){ return title.replace(/[^a-z0-9]+/gi,'_').toLowerCase(); }

    function repClass(n){
      if (n <= 0) return 'rep0';
      if (n === 1) return 'rep1';
      if (n === 2) return 'rep2';
      if (n === 3) return 'rep3';
      if (n === 4) return 'rep4';
      return 'rep5';
    }

    async function postJSON(url, body){
      const r = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body || {})
      });
      return await r.json();
    }

    function disable(ids){
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = true;
      });
    }

    function enable(ids){
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = false;
      });
    }

    async function validarPalestraCasal(title, id){
      const $st = document.getElementById(`${id}_status`);
      const nome_ele = (document.getElementById(`${id}_ele`).value || '').trim();
      const nome_ela = (document.getElementById(`${id}_ela`).value || '').trim();

      if (!nome_ele || !nome_ela) {
        $st.textContent = 'Preencha Nome (Ele) e Nome (Ela).';
        $st.className = 'status warn-t';
        return;
      }

      try {
        const data = await postJSON('{{ url_for("api_palestras_buscar") }}', {
          palestra: title,
          nome_ele,
          nome_ela
        });

        if (!data.ok) {
          $st.textContent = data.msg || 'Falha na busca.';
          $st.className = 'status err';
          return;
        }

        document.getElementById(`${id}_tel`).value = data.telefones || '';
        document.getElementById(`${id}_end`).value = data.endereco || '';

        const n = Math.max(0, Math.min(5, data.repeticoes || 0));
        const bar = document.getElementById(`${id}_rep`);

        bar.className = repClass(n);
        bar.style.width = (n * 20) + '%';

        document.getElementById(`${id}_replabel`).textContent = `${n}/5`;

        $st.textContent = (n >= 5) ? 'Limite atingido — não pode cadastrar.' : 'Casal selecionado e dados carregados.';
        $st.className = (n >= 5) ? 'status err' : 'status ok';

      } catch {
        $st.textContent = 'Erro na validação da palestra.';
        $st.className = 'status err';
      }
    }

    function makeCard(title){
      const id = idFrom(title);
      const ex = EXIST[title] || null;
      const wrap = document.createElement('div');
      wrap.className = 'card';
      wrap.id = `wrap_${id}`;
      if (ex && ex.id) wrap.dataset.recordId = String(ex.id);

      if (SOLO.has(title)) {
        wrap.innerHTML = `
          <h3 style="margin:0 0 8px;">${title} <span class="muted">(solo)</span></h3>
          <label for="${id}_nome">Nome</label>
          <input id="${id}_nome" placeholder="Ex.: Pe. João da Silva" value="${ex ? (ex.nome_ele || '') : ''}">
          <div class="status" id="${id}_status"></div>
          <div class="note">Ao salvar: status = <b>Aberto</b>. Telefones/Endereço não são gravados nesta tela.</div>
          <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn primary" id="${id}_add">${ex ? 'Alterar' : 'Adicionar'}</button>
          </div>
          <div class="justify" id="${id}_just">
            <label for="${id}_obs">Justificativa</label>
            <textarea id="${id}_obs" rows="3" placeholder="Descreva a justificativa..."></textarea>
            <div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">
              <button class="btn danger" id="${id}_rec">Confirmar Recusou</button>
              <button class="btn warn" id="${id}_des">Confirmar Desistiu</button>
              <button class="btn" id="${id}_cancel">Cancelar</button>
            </div>
          </div>
        `;
      } else {
        wrap.setAttribute('data-casal-grupo', '');

        wrap.innerHTML = `
          <h3 style="margin:0 0 8px;">${title}</h3>

          <input type="hidden" id="${id}_casal_id" data-casal-id value="${ex ? (ex.casal_id || '') : ''}">

          <div class="row">
            <div>
              <label for="${id}_ele">Nome (Ele)</label>
              <input id="${id}_ele" data-casal-ele value="${ex ? (ex.nome_ele || '') : ''}" placeholder="Ex.: João">
            </div>
            <div>
              <label for="${id}_ela">Nome (Ela)</label>
              <input id="${id}_ela" data-casal-ela value="${ex ? (ex.nome_ela || '') : ''}" placeholder="Ex.: Maria">
            </div>
          </div>

          <div class="row" style="margin-top:8px;">
            <div>
              <label for="${id}_tel">Telefones</label>
              <input id="${id}_tel" data-casal-telefones placeholder="preenchido pela busca (não grava)">
            </div>
            <div>
              <label for="${id}_end">Endereço</label>
              <input id="${id}_end" data-casal-endereco placeholder="preenchido pela busca (não grava)">
            </div>
          </div>

          <div style="margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <button class="btn" id="${id}_buscar" data-casal-buscar>Buscar casal</button>
            <div class="repbar" style="flex:1; min-width:120px;">
              <div id="${id}_rep" class="rep0" style="width:0%"></div>
            </div>
            <span class="muted" id="${id}_replabel">0/5</span>
          </div>

          <div class="status" id="${id}_status"></div>
          <div class="note">Ao salvar: status = <b>Aberto</b>. Telefones/Endereço não são gravados nesta tela.</div>

          <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn primary" id="${id}_add">${ex ? 'Alterar' : 'Adicionar'}</button>
          </div>

          <div class="justify" id="${id}_just">
            <label for="${id}_obs">Justificativa</label>
            <textarea id="${id}_obs" rows="3" placeholder="Descreva a justificativa..."></textarea>
            <div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">
              <button class="btn danger" id="${id}_rec">Confirmar Recusou</button>
              <button class="btn warn" id="${id}_des">Confirmar Desistiu</button>
              <button class="btn" id="${id}_cancel">Cancelar</button>
            </div>
          </div>
        `;
      }

      $grid.appendChild(wrap);

      const $st = document.getElementById(`${id}_status`);
      const disableSolo = () => disable([`${id}_nome`]);
      const disableCouple = () => disable([`${id}_ele`, `${id}_ela`, `${id}_tel`, `${id}_end`, `${id}_buscar`]);

      if (ex) {
        $st.textContent = `Palestra já cadastrada para este ano (status: ${ex.status || '—'}).`;
        $st.className = 'status ok';
        if (SOLO.has(title)) disableSolo(); else disableCouple();
      }

      const showJust = () => {
        document.getElementById(`${id}_just`).style.display = 'block';
      };

      const hideJust = () => {
        document.getElementById(`${id}_just`).style.display = 'none';
        const t = document.getElementById(`${id}_obs`);
        if (t) t.value = '';
      };

      if (!SOLO.has(title)) {
        wrap.addEventListener('casalSelecionado', async function(){
          await validarPalestraCasal(title, id);
        });
      }

      document.getElementById(`${id}_add`).addEventListener('click', async (e)=>{
        e.preventDefault();

        const ano = ($ano.value || '').trim();

        if (!/^\d{4}$/.test(ano)) {
          $msg.textContent = 'Informe um ano válido (YYYY).';
          $msg.className = 'status err';
          return;
        }

        if (EXIST[title]) {
          showJust();
          return;
        }

        let payload = {
          ano: parseInt(ano, 10),
          palestra: title
        };

        if (SOLO.has(title)) {
          const nome = (document.getElementById(`${id}_nome`).value || '').trim();

          if (!nome) {
            $st.textContent = 'Preencha o nome.';
            $st.className = 'status warn-t';
            return;
          }

          payload.nome_ele = nome;

        } else {
          const casal_id = (document.getElementById(`${id}_casal_id`).value || '').trim();
          const nome_ele = (document.getElementById(`${id}_ele`).value || '').trim();
          const nome_ela = (document.getElementById(`${id}_ela`).value || '').trim();

          if (!nome_ele || !nome_ela) {
            $st.textContent = 'Preencha Nome (Ele) e Nome (Ela).';
            $st.className = 'status warn-t';
            return;
          }

          if (!casal_id) {
            $st.textContent = 'Clique em Buscar casal e selecione um casal antes de salvar.';
            $st.className = 'status warn-t';
            return;
          }

          const label = document.getElementById(`${id}_replabel`).textContent || '0/5';
          const n = parseInt(label.split('/')[0] || '0', 10);

          if (n >= 5) {
            $st.textContent = 'Limite de 5 repetições atingido — escolha outro casal.';
            $st.className = 'status err';
            return;
          }

          payload.casal_id = parseInt(casal_id, 10);
          payload.nome_ele = nome_ele;
          payload.nome_ela = nome_ela;
        }

        try {
          const data = await postJSON('{{ url_for("api_palestras_adicionar") }}', payload);

          if (data.ok) {
            $st.textContent = 'Palestra cadastrada com sucesso (status: Aberto).';
            $st.className = 'status ok';

            if (SOLO.has(title)) disableSolo(); else disableCouple();

            const note = document.createElement('div');
            note.className = 'note';
            note.textContent = 'Para alterar este cadastro recém-inserido, recarregue a página.';
            wrap.appendChild(note);

          } else {
            $st.textContent = data.msg || 'Falha ao cadastrar.';
            $st.className = 'status err';
          }

        } catch {
          $st.textContent = 'Erro ao cadastrar.';
          $st.className = 'status err';
        }
      });

      const $rec = document.getElementById(`${id}_rec`);
      const $des = document.getElementById(`${id}_des`);
      const $can = document.getElementById(`${id}_cancel`);

      if ($rec) $rec.addEventListener('click', async (e)=>{
        e.preventDefault();

        const rid = wrap.dataset.recordId;
        const obs = (document.getElementById(`${id}_obs`).value || '').trim();

        if (!rid) {
          $st.textContent = 'Sem ID do registro. Recarregue a página.';
          $st.className = 'status err';
          return;
        }

        if (!obs) {
          $st.textContent = 'Justificativa é obrigatória.';
          $st.className = 'status err';
          return;
        }

        try {
          const data = await postJSON('{{ url_for("api_palestras_marcar_status") }}', {
            id: parseInt(rid, 10),
            novo_status: 'Recusou',
            observacao: obs
          });

          if (data.ok) {
            $st.textContent = 'Atualizado para Recusou. Campos liberados.';
            $st.className = 'status ok';
            hideJust();

            if (SOLO.has(title)) {
              enable([`${id}_nome`, `${id}_add`]);
            } else {
              enable([`${id}_ele`, `${id}_ela`, `${id}_tel`, `${id}_end`, `${id}_buscar`, `${id}_add`]);
            }

            delete EXIST[title];
            delete wrap.dataset.recordId;

          } else {
            $st.textContent = data.msg || 'Falha ao alterar.';
            $st.className = 'status err';
          }

        } catch {
          $st.textContent = 'Erro ao alterar.';
          $st.className = 'status err';
        }
      });

      if ($des) $des.addEventListener('click', async (e)=>{
        e.preventDefault();

        const rid = wrap.dataset.recordId;
        const obs = (document.getElementById(`${id}_obs`).value || '').trim();

        if (!rid) {
          $st.textContent = 'Sem ID do registro. Recarregue a página.';
          $st.className = 'status err';
          return;
        }

        if (!obs) {
          $st.textContent = 'Justificativa é obrigatória.';
          $st.className = 'status err';
          return;
        }

        try {
          const data = await postJSON('{{ url_for("api_palestras_marcar_status") }}', {
            id: parseInt(rid, 10),
            novo_status: 'Desistiu',
            observacao: obs
          });

          if (data.ok) {
            $st.textContent = 'Atualizado para Desistiu. Campos liberados.';
            $st.className = 'status ok';
            hideJust();

            if (SOLO.has(title)) {
              enable([`${id}_nome`, `${id}_add`]);
            } else {
              enable([`${id}_ele`, `${id}_ela`, `${id}_tel`, `${id}_end`, `${id}_buscar`, `${id}_add`]);
            }

            delete EXIST[title];
            delete wrap.dataset.recordId;

          } else {
            $st.textContent = data.msg || 'Falha ao alterar.';
            $st.className = 'status err';
          }

        } catch {
          $st.textContent = 'Erro ao alterar.';
          $st.className = 'status err';
        }
      });

      if ($can) $can.addEventListener('click', (e)=>{
        e.preventDefault();
        hideJust();
      });

      if (window.ECCCasalBusca && !SOLO.has(title)) {
        window.ECCCasalBusca.fecharPopover();
      }
    }

    function prepararBuscasCasal(){
      if (!window.ECCCasalBusca) return;

      document.querySelectorAll('[data-casal-grupo]').forEach(function(grupo){
        const botao = grupo.querySelector('[data-casal-buscar]');

        if (botao && !botao.dataset.casalBuscaManualOk) {
          botao.dataset.casalBuscaManualOk = '1';

          botao.addEventListener('click', function(e){
            e.preventDefault();
            window.ECCCasalBusca.buscarCasal(grupo);
          });
        }

        grupo.querySelectorAll('[data-casal-ele], [data-casal-ela]').forEach(function(input){
          if (input.dataset.casalBuscaEnterOk) return;

          input.dataset.casalBuscaEnterOk = '1';

          input.addEventListener('keydown', function(e){
            if (e.key === 'Enter') {
              e.preventDefault();
              window.ECCCasalBusca.buscarCasal(grupo);
            }
          });
        });
      });
    }

    function renderGrid(){
      $grid.innerHTML = '';
      TITULOS.forEach(t => makeCard(t));
      $grid.style.display = '';
      prepararBuscasCasal();
    }

    $go.addEventListener('click', async (e)=>{
      const v = ($ano.value || '').trim();

      if (!/^\d{4}$/.test(v)) {
        e.preventDefault();
        $msg.textContent = 'Informe um ano válido (YYYY).';
        $msg.className = 'status err';
        return;
      }

      if ($grid.style.display === 'none') {
        e.preventDefault();
        $msg.textContent = `Ano selecionado: ${v}`;
        $msg.className = 'status ok';
        renderGrid();

        if (TEM_ABERTOS) $go.textContent = 'Encerrar';
        return;
      }

      if ($go.textContent.trim().toLowerCase() === 'encerrar') {
        e.preventDefault();

        const ok = window.confirm('Encerrar este ano? Todos os registros ABERTOS passarão a CONCLUIDO.');
        if (!ok) return;

        try {
          const data = await postJSON('{{ url_for("api_palestras_encerrar_ano") }}', {
            ano: parseInt(v, 10)
          });

          if (data.ok) {
            alert('Ano encerrado com sucesso!');
            window.location.href = '{{ url_for("palestras_painel") }}';
          } else {
            alert(data.msg || 'Falha ao encerrar.');
          }

        } catch {
          alert('Erro ao encerrar.');
        }

        return;
      }

      $msg.textContent = `Ano selecionado: ${v}`;
      $msg.className = 'status ok';
    });

    window.addEventListener('DOMContentLoaded', ()=>{
      if (anoPre) {
        $msg.textContent = `Ano selecionado: ${anoPre}`;
        $msg.className = 'status ok';
        renderGrid();

        if (TEM_ABERTOS) $go.textContent = 'Encerrar';
      }
    });
  </script>
{% endblock %}
