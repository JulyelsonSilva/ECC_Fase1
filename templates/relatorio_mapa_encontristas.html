{% extends "base.html" %}

{% block title %}Mapa dos Encontristas | Sistema do ECC{% endblock %}

{% block extra_head %}
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  >

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  >

  <style>
    .map-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .map-toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #map {
      height: calc(100vh - 220px);
      min-height: 520px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: #f8fafc;
    }

    .popup h3 {
      margin: .2em 0 .4em;
      font-size: 16px;
    }

    .popup p {
      margin: .2em 0;
      font-size: 13px;
      color: #334155;
    }

    @media (max-width: 720px) {
      #map {
        height: 70vh;
        min-height: 420px;
      }

      .map-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
{% endblock %}

{% block content %}
  <section class="map-toolbar">
    <div>
      <div class="eyebrow">Relatórios</div>
      <h1 class="page-title">Mapa dos Encontristas</h1>
    </div>

    <div class="map-toolbar-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i>
        Voltar
      </a>

      <a href="{{ url_for('auditoria_enderecos') }}" class="btn btn-primary">
        <i class="bi bi-geo-alt"></i>
        Auditar Endereços
      </a>
    </div>
  </section>

  <div id="map"></div>
{% endblock %}

{% block extra_scripts %}
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
  </script>

  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    (async function () {
      const map = L.map('map').setView([-9.6498, -35.7089], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      const r = await fetch('/api/encontristas/geo');
      const gj = await r.json();

      const markers = L.markerClusterGroup();

      const geojson = L.geoJSON(gj, {
        pointToLayer: (feature, latlng) => L.marker(latlng),

        onEachFeature: (feature, layer) => {
          const p = feature.properties || {};

          const html = `
            <div class="popup">
              <h3>${p.nome || 'Casal'}</h3>
              <p><b>Ano do Encontro:</b> ${p.ano ?? ''}</p>
              <p><b>Endereço:</b> ${p.endereco || ''}</p>
              <p><a href="/visao-casal?id=${p.id}">Ver detalhes</a></p>
            </div>
          `;

          layer.bindPopup(html);
        }
      });

      markers.addLayer(geojson);
      map.addLayer(markers);

      if (gj.features && gj.features.length > 0) {
        const bbox = L.geoJSON(gj).getBounds();
        map.fitBounds(bbox.pad(0.1));
      }
    })();
  </script>
{% endblock %}
