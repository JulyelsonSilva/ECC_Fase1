{% extends "base.html" %}

{% block title %}Editar Encontrista | Sistema do ECC{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <div class="eyebrow">Encontristas</div>
      <h1 class="page-title">Editar casal</h1>
      <p class="page-subtitle">
        Atualize os dados do casal encontrista.
      </p>
    </div>

    <a href="{{ url_for('encontristas') }}" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i>
      Voltar
    </a>
  </section>

  <section class="card">
    <div class="card-body">
      <form method="POST" class="stack">

        <h2>Dados do encontro</h2>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:12px;">
          <div>
            <label>Ano</label>
            <input type="number" name="ano" value="{{ e.ano }}">
          </div>

          <div>
            <label>Número do ECC</label>
            <input type="text" name="num_ecc" value="{{ e.num_ecc }}">
          </div>

          <div>
            <label>Data do casamento</label>
            <input type="date" name="data_casamento" value="{{ e.data_casamento }}">
          </div>
        </div>

        <hr>

        <h2>Dados do casal</h2>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:12px;">
          <div>
            <label>Nome completo (ele)</label>
            <input type="text" name="nome_completo_ele" value="{{ e.nome_completo_ele }}">
          </div>

          <div>
            <label>Nome completo (ela)</label>
            <input type="text" name="nome_completo_ela" value="{{ e.nome_completo_ela }}">
          </div>

          <div>
            <label>Nome usual (ele)</label>
            <input type="text" name="nome_usual_ele" value="{{ e.nome_usual_ele }}">
          </div>

          <div>
            <label>Nome usual (ela)</label>
            <input type="text" name="nome_usual_ela" value="{{ e.nome_usual_ela }}">
          </div>
        </div>

        <hr>

        <h2>Contato</h2>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:12px;">
          <div>
            <label>Telefone (ele)</label>
            <input type="text" name="telefone_ele" value="{{ e.telefone_ele }}">
          </div>

          <div>
            <label>Telefone (ela)</label>
            <input type="text" name="telefone_ela" value="{{ e.telefone_ela }}">
          </div>
        </div>

        <div>
          <label>Endereço</label>
          <input type="text" name="endereco" value="{{ e.endereco }}">
        </div>

        <hr>

        <h2>Observações</h2>

        <div>
          <label>Observação</label>
          <textarea name="observacao">{{ e.observacao }}</textarea>
        </div>

        <div>
          <label>Observação extra</label>
          <textarea name="observacao_extra">{{ e.observacao_extra }}</textarea>
        </div>

        <div class="form-actions">
          <a href="{{ url_for('encontristas') }}" class="btn btn-secondary">
            Cancelar
          </a>

          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i>
            Salvar
          </button>
        </div>

      </form>
    </div>
  </section>
{% endblock %}
